########################################################################################################################
# Chrono Physics Engine Configuration
#
# This YAML file defines the main parameters for the Chrono physics system.
# Use it to configure gravity, solvers, and collision settings for UAV simulation.
#
# NOTE: Boolean flags below use `true`/`false` — YAML is case-insensitive.
########################################################################################################################


# ============================================================================
# Physics Settings
# ============================================================================
physics:
  # Enable gravity in NED frame [0, 0, 9.81]
  # true  → Apply Earth gravity
  # false → Zero-gravity simulation
  gravity: false


# ============================================================================
# Solver Settings
# !!! IMPORTANT: Only one solver should be enabled at a time !!!
# ============================================================================
solver:
  # Choose solver type
  # Projected SOR solver (set true to enable)
  PSOR: true
  
  # Solver iteration settings - Maximum solver iterations per timestep
  MaxIterations: 1000 
  
  # Warm start option — speeds up convergence by using previous solutions
  EnableWarmStart: true

  # Step size - Size of each iteration step
  StepSize: 5e-3


# ============================================================================
# Collision Settings
# !!! IMPORTANT: Only one collision system should be enabled at a time !!!
# ============================================================================
collision:
  # Select collision detection system
  # Bullet collision system (recommended for general use)
  # Multicore collision system (set true for parallel CPU use)
  BULLET: true
  MULTICORE: false
  
  # Contact distance and tolerance parameters ----------------------
  # Collision envelope thickness
  DefaultSuggestedEnvelope: 0.003
  # Minimum distance before contact triggers
  DefaultSuggestedMargin:   0.003
  # Separation distance at which contact is broken
  ContactBreakingThreshold: 0.002



