########################################################################################################################
# Visualization & Simulation Display Options
#
# This YAML file configures the appearance and interactivity of the ACSL Physics
# Simulator visualization window. Fine-tune rendering, camera, and frame overlays 
# to suit your simulation needs and preferred workflow.
########################################################################################################################


# ============================================================================
# Main Visualization Toggles
# ============================================================================
main:
  # Enable the interactive visualization window --------------------
  # Set to false for headless/speed mode
  enable_vis: true

  # Camera options -------------------------------------------------
  # true: fixed viewpoint; false: dynamic/follow
  enable_static_cam: true
  # (m) Distance the camera is placed in z (NED)
  mv_cam_chase_ht: 2.0
  # (m) Distance the camera is placed in x (NED) 
  mv_cam_chase_dt: 2.5
  
  # Frame overlays -------------------------------------------------
  # Show NED reference frame axes in the scene
  render_ned_frame: true
  # Show body-fixed UAV frame axes
  render_body_frame: true
  # Show all COG frames in the scene
  render_all_COG_frames: false

  # Rendering effects ----------------------------------------------
  # Toggle shadow rendering (GPU-intensive)
  render_shadows: false
  # Visualize collision/contact boundaries
  render_collision_zones: true


# ============================================================================
# Window & UI Options
# ============================================================================
window:
  # (px) Window width for the display
  width: 1600
  # (px) Window height for the display
  height: 1200
  # Title bar text for visualization window
  title: "ACSL PHYSICS SIMULATOR"